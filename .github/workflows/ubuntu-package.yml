name: ubuntu-package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ubuntu-package-pages
  cancel-in-progress: true

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          python -m pip install --upgrade build wheel

      - name: Build Python artifacts
        run: python -m build --no-isolation

      - name: Build Debian package
        run: |
          python scripts/build_deb.py \
            --project-root . \
            --maintainer "DevDoctor Maintainers <noreply@github.com>"

      - name: Build unsigned apt repo layout
        run: |
          python scripts/build_apt_repo.py \
            --repo-dir apt-repo \
            --repo-url https://raw.githubusercontent.com/tusharravindran/devdoctor/apt \
            dist/*.deb

      - name: Write package feed metadata
        run: |
          mkdir -p apt-repo
          python - <<'PY'
          from pathlib import Path

          readme = """# devdoctor apt repo

          This branch hosts the unsigned third-party APT feed for devdoctor releases.

          Install:

              echo "deb [trusted=yes] https://raw.githubusercontent.com/tusharravindran/devdoctor/apt stable main" | sudo tee /etc/apt/sources.list.d/devdoctor.list
              sudo apt update
              sudo apt install devdoctor
          """
          Path("apt-repo/README.md").write_text(readme, encoding="utf-8")
          PY

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-package
          path: |
            dist/*.deb
            apt-repo/**

      - name: Publish apt branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          temp_dir="$(mktemp -d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin apt >/dev/null 2>&1; then
            git clone --branch apt --single-branch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${temp_dir}"
          else
            git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${temp_dir}"
            cd "${temp_dir}"
            git checkout --orphan apt
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cd - >/dev/null
          fi

          rsync -a --delete --exclude '.git' apt-repo/ "${temp_dir}/"
          cd "${temp_dir}"
          git add .
          if git diff --cached --quiet; then
            echo "No apt repo changes to publish."
            exit 0
          fi
          git commit -m "Publish apt repo for ${GITHUB_REF_NAME}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:apt
